<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> A의 캐비닛</title>
    <style>
        /* 기본 테마 설정 */
        :root {
            --bg-dark: #0a0a0a;
            --metal: #2c2c2c;
            --accent: #8b0000; /* 상실의 붉은색 */
            --paper: #fdf5e6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            color: #ccc;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Apple SD Gothic Neo', 'Noto Serif KR', serif;
            overflow: hidden;
        }

        /* 3D 스테이지 */
        .stage {
            perspective: 2000px;
            width: 350px;
            height: 600px;
        }

        /* 캐비닛 본체 */
        .cabinet {
            width: 100%;
            height: 100%;
            background: #111;
            border: 4px solid #000;
            position: relative;
            transform-style: preserve-3d;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
        }

        /* 캐비닛 내부 공간 */
        .cabinet-inner {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
            background: linear-gradient(to bottom, #050505, #111);
        }

        /* [섹터 1] 벽면 - 사진들 */
        .section-wall {
            flex: 2;
            border-bottom: 1px solid #222;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
            align-content: center;
        }

        .photo-item {
            width: 100%;
            aspect-ratio: 1/1;
            background: #222;
            border: 4px solid #fff;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: transform 0.3s;
            position: relative;
        }
        .photo-item:hover { transform: scale(1.1) rotate(0deg); z-index: 5; }
        .photo-item::before { /* 핀 */
            content: ''; position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
            width: 8px; height: 8px; background: var(--accent); border-radius: 50%;
        }

        /* [섹터 2] 하단 - 일기장 */
        .section-floor {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .diary-book {
            width: 120px;
            height: 160px;
            background: #3d2b1f;
            border-left: 10px solid #2a1f16;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.6);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.8rem;
            color: #8a705e;
            transition: 0.3s;
        }
        .diary-book:hover { transform: translateY(-10px); color: #fff; }

        /* 캐비닛 문 */
        .door {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #333, #1a1a1a);
            border: 2px solid #000;
            z-index: 10;
            transform-origin: left;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .handle {
            position: absolute;
            right: 20px;
            width: 12px;
            height: 80px;
            background: #111;
            border-radius: 6px;
        }

        /* 문 열림 상태 */
        .cabinet.open .door {
            transform: rotateY(-130deg);
        }

        /* 모달 (팝업창) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-content {
            background: var(--paper);
            color: #222;
            width: 100%;
            max-width: 600px;
            padding: 40px;
            position: relative;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
        }
        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 2rem;
            cursor: pointer;
        }

        /* 도움말 */
        .tip {
            position: absolute;
            bottom: -50px;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="stage">
        <div class="cabinet" id="myCabinet">
            <div class="cabinet-inner">
                <div class="section-wall">
                    <div class="photo-item" style="transform: rotate(-5deg);" onclick="openModal('photo', 'T01_0도의 시선 스틸컷')"></div>
                    <div class="photo-item" style="transform: rotate(3deg);" onclick="openModal('photo', 'T04_서로를 먹는 꿈 스틸컷')"></div>
                </div>
                <div class="section-floor">
                    <div class="diary-book" onclick="openModal('diary')">A's DIARY</div>
                </div>
            </div>
            <div class="door" onclick="toggleDoor()">
                <div class="handle"></div>
            </div>
        </div>
        <div class="tip">TAP TO EXPLORE A'S ROOM</div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modal-title" style="font-weight: bold; margin-bottom: 20px; color: var(--accent);"></div>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        // 문 열기/닫기
        function toggleDoor() {
            document.getElementById('myCabinet').classList.toggle('open');
        }

        // 모달 열기
        function openModal(type, title) {
            // 이벤트 전파 방지 (캐비닛 문이 닫히지 않게)
            event.stopPropagation();
            
            const modal = document.getElementById('modal');
            const mTitle = document.getElementById('modal-title');
            const mBody = document.getElementById('modal-body');

            modal.style.display = 'flex';

            if (type === 'photo') {
                mTitle.innerText = title;
                mBody.innerHTML = '<div style="width:100%; height:300px; background:#ddd; display:flex; justify-content:center; align-items:center;">[여기에 이미지를 넣으세요]</div>';
            } else if (type === 'diary') {
                mTitle.innerText = "A의 일기 기록";
                mBody.innerHTML = `
                    <div style="margin-bottom:20px;"><strong>202X.03.15</strong><br>세상이 0도가 되었다. 아무런 온기도 없다.</div>
                    <div style="margin-bottom:20px;"><strong>202X.04.22</strong><br>너를 온전히 삼키고 싶었다. 그게 사랑인 줄 알았다.</div>
                    <hr>
                    <p style="margin-top:20px; font-size:0.9rem; color:#666;">...이후의 기록은 제작 중입니다.</p>
                `;
            }
        }

        // 모달 닫기
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        // 배경 클릭시 모달 닫기
        window.onclick = function(event) {
            if (event.target == document.getElementById('modal')) {
                closeModal();
            }
        }
    </script>
</body>
</html>
