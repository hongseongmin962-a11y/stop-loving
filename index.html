<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사랑을 그만두는 방법 - A의 캐비닛</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="stage">
        <div class="cabinet" id="myCabinet">
            <div class="cabinet-inner">
                <div class="section-wall">
                    <div class="photo-item" style="transform: rotate(-5deg);" onclick="openModal('photo', 'T01_0도의 시선 스틸컷')"></div>
                    <div class="photo-item" style="transform: rotate(3deg);" onclick="openModal('photo', 'T04_서로를 먹는 꿈 스틸컷')"></div>
                </div>
                <div class="section-floor">
                    <div class="diary-book" onclick="openModal('diary')">A's DIARY</div>
                </div>
            </div>
            <div class="door" onclick="toggleDoor()">
                <div class="handle"></div>
            </div>
        </div>
        <div class="tip">TAP TO EXPLORE A'S ROOM</div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modal-title" style="font-weight: bold; margin-bottom: 20px; color: var(--accent);"></div>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
